<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MobileVC Vibe Coding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    .markdown-body {
      color: #f4f4f5;
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .markdown-body > *:first-child { margin-top: 0; }
    .markdown-body > *:last-child { margin-bottom: 0; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      margin: 1rem 0 0.5rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .markdown-body h1 { font-size: 1.25rem; }
    .markdown-body h2 { font-size: 1.1rem; }
    .markdown-body h3 { font-size: 1rem; }
    .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body pre, .markdown-body blockquote {
      margin: 0.75rem 0;
    }
    .markdown-body ul, .markdown-body ol {
      padding-left: 1.25rem;
    }
    .markdown-body code:not(pre code) {
      background: rgba(255,255,255,0.08);
      border-radius: 0.4rem;
      padding: 0.12rem 0.35rem;
      font-size: 0.9em;
    }
    .markdown-body pre {
      position: relative;
      overflow-x: auto;
      border-radius: 0.9rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0f172a;
      padding: 1rem;
    }
    .markdown-body pre code {
      background: transparent;
      padding: 0;
      font-size: 0.88rem;
    }
    .markdown-body blockquote {
      border-left: 3px solid rgba(96,165,250,0.7);
      padding-left: 0.9rem;
      color: #d4d4d8;
    }
    .code-copy-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(24,24,27,0.9);
      color: #fafafa;
      border-radius: 0.6rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.75rem;
      line-height: 1;
    }
    .code-copy-btn:hover {
      background: rgba(39,39,42,0.95);
    }
    .action-scrollbar::-webkit-scrollbar,
    .sidebar-scrollbar::-webkit-scrollbar,
    .diff-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .action-scrollbar,
    .sidebar-scrollbar,
    .diff-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes pulse-file {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.12); }
      50% { box-shadow: 0 0 0 6px rgba(59,130,246,0.22); }
    }
    @keyframes crab-crawl {
      0%, 100% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
    }
    .crab-icon {
      display: inline-block;
      animation: crab-crawl 1.2s ease-in-out infinite;
    }
    @keyframes step-flow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(220%); }
    }
    .file-attention {
      border-color: rgba(96,165,250,0.9);
      background: rgba(30,41,59,0.95);
      animation: pulse-file 1.8s ease-in-out infinite;
    }
    .step-running::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 38%;
      background: linear-gradient(90deg, transparent, rgba(96,165,250,0.95), transparent);
      animation: step-flow 1.4s linear infinite;
    }
    .diff-added { background: rgba(34,197,94,0.13); color: #dcfce7; }
    .diff-removed { background: rgba(248,113,113,0.13); color: #fee2e2; }
    .diff-meta { color: #93c5fd; }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <div id="sidebarOverlay" class="pointer-events-none fixed inset-0 z-40 bg-black/60 opacity-0 transition-opacity duration-300"></div>
  <aside id="sidebar" class="sidebar-scrollbar fixed inset-y-0 left-0 z-50 w-[86vw] max-w-sm -translate-x-full overflow-y-auto border-r border-zinc-800 bg-zinc-950/98 p-4 shadow-2xl transition-transform duration-300">
    <div class="mb-4 flex items-start justify-between gap-3">
      <div class="min-w-0">
        <p class="text-sm font-semibold text-zinc-100">工作区文件树</p>
        <p id="sidebarPath" class="mt-1 break-all text-xs text-zinc-400">.</p>
      </div>
      <button id="closeSidebarBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">关闭</button>
    </div>
    <div class="mb-3 flex gap-2">
      <button id="sidebarUpBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-100 hover:bg-zinc-800">⬅ 上一级</button>
      <button id="sidebarRefreshBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-100 hover:bg-zinc-800">刷新</button>
    </div>
    <div id="fileList" class="space-y-2"></div>
  </aside>

  <div id="appShell" class="mx-auto flex min-h-screen w-full max-w-4xl flex-col px-3 pt-3 sm:px-4">
    <header class="sticky top-0 z-20 mb-3 rounded-3xl border border-zinc-800 bg-zinc-900/88 px-4 py-3 shadow-xl backdrop-blur">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <button id="openSidebarBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-base text-zinc-100 hover:bg-zinc-800">📁</button>
            <div class="min-w-0">
              <h1 class="truncate text-lg font-semibold tracking-tight">MobileVC</h1>
              <p id="workspacePath" class="mt-1 truncate text-sm text-zinc-400">工作区：.</p>
            </div>
          </div>
        </div>
        <button id="retokenBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">Token</button>
      </div>
      <div class="mt-3 flex flex-wrap items-center gap-2 text-sm text-zinc-300">
        <div class="flex items-center gap-2 rounded-full border border-zinc-800 px-3 py-1.5">
          <span id="statusDot" class="h-2.5 w-2.5 rounded-full bg-red-500 transition-colors duration-300"></span>
          <span id="statusText">未连接</span>
        </div>
        <div class="rounded-full border border-zinc-800 px-3 py-1.5 text-xs text-zinc-400">
          会话 <span id="sessionText">-</span>
        </div>
        <div id="runtimeMetaBadge" class="hidden rounded-full border border-violet-800 bg-violet-950/40 px-3 py-1.5 text-xs text-violet-200"></div>
        <button id="resumeSessionBtn" class="hidden rounded-2xl border border-emerald-700 bg-emerald-950/40 px-3 py-2 text-xs text-emerald-100 hover:bg-emerald-900/60">恢复会话</button>
        <button id="reconnectBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">重连</button>
      </div>
      <div class="mt-3 flex items-center gap-2">
        <span class="text-xs uppercase tracking-wide text-zinc-500">视图</span>
        <button id="structuredViewBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-100 hover:bg-zinc-800">结构化视图</button>
        <button id="rawTerminalViewBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-100 hover:bg-zinc-800">原始终端</button>
        <span class="text-xs uppercase tracking-wide text-zinc-500 ml-2">权限</span>
        <select id="permissionModeSelect" class="rounded-2xl border border-zinc-700 bg-zinc-950 px-3 py-2 text-xs text-zinc-100 outline-none">
          <option value="acceptEdits">自动接受编辑 (推荐)</option>
          <option value="auto">全自动</option>
          <option value="bypassPermissions">跳过全部权限</option>
          <option value="plan">仅规划</option>
          <option value="">默认 (需手动授权)</option>
        </select>
      </div>
      <div id="stepPanel" class="mt-3 hidden rounded-2xl border border-zinc-800 bg-zinc-950/70 px-3 py-2">
        <div class="mb-2 flex items-center justify-between gap-3">
          <p class="text-xs font-semibold uppercase tracking-wide text-zinc-400">当前步骤</p>
          <div class="flex items-center gap-2">
            <button id="stepSkillBtn" class="hidden rounded-2xl border border-zinc-700 px-3 py-1.5 text-[11px] text-zinc-200 hover:bg-zinc-800">更多 Skill</button>
            <span id="stepStatusText" class="text-[11px] uppercase tracking-wide text-zinc-500">running</span>
          </div>
        </div>
        <p id="stepText" class="text-sm text-zinc-200"></p>
        <div id="stepMetaText" class="mt-2 text-xs text-zinc-400"></div>
        <div class="mt-2 h-1.5 overflow-hidden rounded-full bg-zinc-800">
          <div id="stepBar" class="relative h-full rounded-full bg-blue-500/80"></div>
        </div>
      </div>
    </header>

    <main class="flex-1">
      <div id="chatContainer" class="space-y-3"></div>
    </main>
  </div>

  <div id="diffModal" class="pointer-events-none fixed inset-0 z-50 flex items-end justify-center bg-black/70 px-3 pb-3 pt-10 opacity-0 transition duration-200 sm:items-center sm:p-6">
    <div id="diffModalCard" class="diff-scrollbar max-h-[88vh] w-full max-w-3xl overflow-y-auto rounded-3xl border border-zinc-800 bg-zinc-950 shadow-2xl">
      <div class="sticky top-0 z-10 border-b border-zinc-800 bg-zinc-950/95 px-4 py-3 backdrop-blur">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <p id="diffTitle" class="truncate text-sm font-semibold text-zinc-100">Diff 预览</p>
            <p id="diffPathText" class="mt-1 break-all text-xs text-zinc-400"></p>
            <p id="diffMetaText" class="mt-1 text-[11px] text-violet-300"></p>
          </div>
          <div class="flex shrink-0 items-center gap-2">
            <button id="diffSkillBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">更多 Skill</button>
            <button id="copyDiffBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">复制</button>
            <button id="closeDiffBtn" class="rounded-2xl border border-zinc-700 px-3 py-2 text-xs text-zinc-200 hover:bg-zinc-800">关闭</button>
          </div>
        </div>
      </div>
      <div class="px-4 py-4">
        <pre id="diffContent" class="overflow-x-auto whitespace-pre-wrap break-words rounded-2xl border border-zinc-800 bg-zinc-900/90 p-4 font-mono text-xs leading-6 text-zinc-100"></pre>
      </div>
    </div>
  </div>

  <div id="contextSkillMenu" class="pointer-events-none fixed z-[60] min-w-52 rounded-2xl border border-zinc-800 bg-zinc-950/98 p-2 opacity-0 shadow-2xl transition">
    <div id="contextSkillMenuTitle" class="px-3 py-2 text-[11px] uppercase tracking-wide text-zinc-500"></div>
    <div id="contextSkillMenuItems" class="space-y-1"></div>
  </div>

  <div id="bottomDock" class="fixed inset-x-0 bottom-0 z-30 mx-auto w-full max-w-4xl px-3 pb-3 sm:px-4">
    <section class="rounded-3xl border border-zinc-800 bg-zinc-900/92 p-3 shadow-2xl backdrop-blur">
      <div id="activitySummary" class="hidden mb-2 flex items-center gap-2 rounded-2xl border border-zinc-800 bg-zinc-950/70 px-3 py-2 text-xs text-zinc-300">
        <span id="activityIcon" class="text-base">🤖</span>
        <span id="activityTool" class="font-medium text-zinc-100"></span>
        <span id="activityTarget" class="truncate text-zinc-400"></span>
        <span class="ml-auto flex items-center gap-2 shrink-0">
          <span id="activityTimer" class="tabular-nums text-zinc-400"></span>
          <span id="activityEstimate" class="text-zinc-500"></span>
        </span>
      </div>
      <div id="actionPanel" class="action-scrollbar mb-3 flex gap-2 overflow-x-auto pb-1"></div>

      <section id="inputCard" class="mb-3 hidden rounded-2xl border border-blue-900/70 bg-blue-950/20 p-3">
        <div class="mb-2">
          <p class="text-sm font-semibold text-blue-200">等待输入</p>
          <p id="promptText" class="mt-1 text-sm text-zinc-300"></p>
        </div>
        <div id="promptOptionButtons" class="mb-3 flex flex-wrap gap-2"></div>
        <form id="inputForm" class="flex gap-2">
          <input id="inputField" type="text" autocomplete="off" placeholder="输入要回复的内容" class="min-w-0 flex-1 rounded-2xl border border-zinc-800 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-500 focus:border-zinc-600" />
          <button id="sendInputBtn" type="submit" class="rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-medium text-white hover:bg-emerald-500">发送</button>
        </form>
      </section>

      <form id="commandForm" class="flex gap-2">
        <input id="commandInput" type="text" autocomplete="off" placeholder="例如：gemini、claude、python，或直接输入命令" class="min-w-0 flex-1 rounded-2xl border border-zinc-800 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none placeholder:text-zinc-500 focus:border-zinc-600" />
        <button id="runBtn" type="submit" class="rounded-2xl bg-blue-600 px-4 py-3 text-sm font-medium text-white hover:bg-blue-500 disabled:cursor-not-allowed disabled:bg-zinc-700">运行</button>
      </form>
    </section>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    const chatContainer = document.getElementById('chatContainer');
    const commandForm = document.getElementById('commandForm');
    const commandInput = document.getElementById('commandInput');
    const runBtn = document.getElementById('runBtn');
    const inputCard = document.getElementById('inputCard');
    const inputForm = document.getElementById('inputForm');
    const inputField = document.getElementById('inputField');
    const sendInputBtn = document.getElementById('sendInputBtn');
    const promptText = document.getElementById('promptText');
    const promptOptionButtons = document.getElementById('promptOptionButtons');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const sessionText = document.getElementById('sessionText');
    const reconnectBtn = document.getElementById('reconnectBtn');
    const runtimeMetaBadge = document.getElementById('runtimeMetaBadge');
    const retokenBtn = document.getElementById('retokenBtn');
    const actionPanel = document.getElementById('actionPanel');
    const openSidebarBtn = document.getElementById('openSidebarBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const structuredViewBtn = document.getElementById('structuredViewBtn');
    const rawTerminalViewBtn = document.getElementById('rawTerminalViewBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const workspacePath = document.getElementById('workspacePath');
    const sidebarPath = document.getElementById('sidebarPath');
    const fileList = document.getElementById('fileList');
    const sidebarUpBtn = document.getElementById('sidebarUpBtn');
    const sidebarRefreshBtn = document.getElementById('sidebarRefreshBtn');
    const stepPanel = document.getElementById('stepPanel');
    const stepText = document.getElementById('stepText');
    const stepMetaText = document.getElementById('stepMetaText');
    const stepStatusText = document.getElementById('stepStatusText');
    const stepBar = document.getElementById('stepBar');
    const stepSkillBtn = document.getElementById('stepSkillBtn');
    const diffModal = document.getElementById('diffModal');
    const diffTitle = document.getElementById('diffTitle');
    const diffPathText = document.getElementById('diffPathText');
    const diffMetaText = document.getElementById('diffMetaText');
    const diffContent = document.getElementById('diffContent');
    const copyDiffBtn = document.getElementById('copyDiffBtn');
    const closeDiffBtn = document.getElementById('closeDiffBtn');
    const diffSkillBtn = document.getElementById('diffSkillBtn');
    const contextSkillMenu = document.getElementById('contextSkillMenu');
    const contextSkillMenuTitle = document.getElementById('contextSkillMenuTitle');
    const contextSkillMenuItems = document.getElementById('contextSkillMenuItems');
    const appShell = document.getElementById('appShell');
    const bottomDock = document.getElementById('bottomDock');
    const resumeSessionBtn = document.getElementById('resumeSessionBtn');
    const permissionModeSelect = document.getElementById('permissionModeSelect');

    // restore saved permission mode (default to acceptEdits)
    permissionModeSelect.value = localStorage.getItem('vibe_permissionMode') || 'acceptEdits';
    permissionModeSelect.addEventListener('change', () => {
      localStorage.setItem('vibe_permissionMode', permissionModeSelect.value);
    });

    // dedup state for frontend events
    const dedupState = {
      lastLogMsg: '', lastLogStream: '', lastLogTime: 0,
      lastStepMsg: '', lastStepStatus: ''
    };

    const activitySummary = document.getElementById('activitySummary');
    const activityIcon = document.getElementById('activityIcon');
    const activityTool = document.getElementById('activityTool');
    const activityTarget = document.getElementById('activityTarget');
    const activityTimer = document.getElementById('activityTimer');
    const activityEstimate = document.getElementById('activityEstimate');

    const claudeActivity = {
      active: false,
      startTime: 0,
      turnStartTime: 0,
      turns: [],
      currentTool: '',
      currentTarget: '',
      totalCost: 0,
      timerInterval: null,
    };

    const toolIcons = {
      Read: '\u{1F4D6}', Edit: '\u{270F}\u{FE0F}', Write: '\u{1F4DD}',
      Bash: '\u{1F4BB}', Grep: '\u{1F50D}', Glob: '\u{1F4C1}',
      WebFetch: '\u{1F310}', WebSearch: '\u{1F310}',
      TaskCreate: '\u{1F4CB}', TaskUpdate: '\u{1F4CB}',
      NotebookEdit: '\u{1F4D3}', Agent: '\u{1F916}',
    };

    function formatDuration(ms) {
      if (ms < 1000) return '<1s';
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      return m + 'm' + (s % 60) + 's';
    }

    function getAvgTurnDuration() {
      const completed = claudeActivity.turns.filter(t => t.endMs > 0);
      if (!completed.length) return 0;
      const total = completed.reduce((sum, t) => sum + (t.endMs - t.startMs), 0);
      return total / completed.length;
    }

    function startActivityTimer() {
      stopActivityTimer();
      claudeActivity.active = true;
      claudeActivity.startTime = Date.now();
      claudeActivity.turns = [];
      claudeActivity.timerInterval = setInterval(updateActivityDisplay, 1000);
      updateActivityDisplay();
    }

    function resetTaskTimer() {
      claudeActivity.startTime = Date.now();
      claudeActivity.turns = [];
      if (!claudeActivity.active) startActivityTimer();
      updateActivityDisplay();
    }

    function stopActivityTimer() {
      claudeActivity.active = false;
      if (claudeActivity.timerInterval) {
        clearInterval(claudeActivity.timerInterval);
        claudeActivity.timerInterval = null;
      }
    }

    function onToolStart(toolName, target) {
      claudeActivity.currentTool = toolName;
      claudeActivity.currentTarget = target || '';
      claudeActivity.turnStartTime = Date.now();
      claudeActivity.turns.push({ tool: toolName, target, startMs: Date.now(), endMs: 0 });
      if (!claudeActivity.active) startActivityTimer();
      updateActivityDisplay();
    }

    function onToolDone(target) {
      const last = claudeActivity.turns[claudeActivity.turns.length - 1];
      if (last && last.endMs === 0) {
        last.endMs = Date.now();
      }
      claudeActivity.currentTool = '';
      claudeActivity.currentTarget = '';
      updateActivityDisplay();
    }

    function onClaudeFinish(summaryMsg) {
      stopActivityTimer();
      claudeActivity.currentTool = '';
      claudeActivity.currentTarget = '';
      if (summaryMsg) {
        activitySummary.classList.remove('hidden');
        activityIcon.textContent = '\u{2705}';
        activityTool.textContent = '\u{5B8C}\u{6210}';
        activityTarget.textContent = '';
        const elapsed = claudeActivity.startTime ? Date.now() - claudeActivity.startTime : 0;
        activityTimer.textContent = elapsed ? formatDuration(elapsed) : '';
        activityEstimate.textContent = summaryMsg;
        syncBottomSpacing();
        setTimeout(() => { activitySummary.classList.add('hidden'); syncBottomSpacing(); }, 8000);
      } else {
        activitySummary.classList.add('hidden');
      }
    }

    function updateActivityDisplay() {
      if (!claudeActivity.active && !claudeActivity.currentTool) {
        activitySummary.classList.add('hidden');
        return;
      }
      activitySummary.classList.remove('hidden');
      const tool = claudeActivity.currentTool;
      const iconChar = (tool && toolIcons[tool]) || '\u{1F980}';
      activityIcon.innerHTML = '<span class="crab-icon">' + iconChar + '</span>';
      activityTool.textContent = tool || '\u{601D}\u{8003}\u{4E2D}';
      const target = claudeActivity.currentTarget;
      activityTarget.textContent = target ? '\u{2192} ' + (target.length > 40 ? '...' + target.slice(-37) : target) : '';
      const elapsed = claudeActivity.startTime ? Date.now() - claudeActivity.startTime : 0;
      activityTimer.textContent = '\u{5DF2}\u{7528} ' + formatDuration(elapsed);
      const avg = getAvgTurnDuration();
      if (avg > 0 && tool) {
        const turnElapsed = Date.now() - claudeActivity.turnStartTime;
        const remaining = Math.max(0, avg - turnElapsed);
        activityEstimate.textContent = '\u{00B7} \u{9884}\u{8BA1} ~' + formatDuration(remaining);
      } else {
        activityEstimate.textContent = '';
      }
      syncBottomSpacing();
    }

    const appState = {
      token: localStorage.getItem('vibe_token') || '',
      ws: null,
      connection: { connected: false, running: false },
      session: { id: '', claudeInteractiveActive: false, activeAI: 'claude', lastPromptMessage: '' },
      view: { mode: 'structured' },
      workspace: { cwd: '.', items: [], sidebarOpen: false, highlightedFilePath: '' },
      prompt: { awaitingInput: false, options: [], message: '' }
    };

    const runtimeState = {
      meta: {
        source: '', skillName: '', target: '', targetType: '', targetPath: '', resultView: '',
        resumeSessionId: '', contextId: '', contextTitle: '', targetText: ''
      },
      agentState: 'IDLE',
      agentStateMessage: '',
      activeContextType: '',
      skillMenu: { open: false, contextType: '', contextId: '', anchorRect: null, items: [] }
    };

    const projectionState = {
      currentDiff: null,
      currentStep: null,
      latestError: null,
      contexts: { diff: null, step: null, error: null },
      logEntries: [],
      rawTerminalByStream: { stdout: '', stderr: '' }
    };

    function syncBottomSpacing() {
      const dockHeight = bottomDock ? bottomDock.offsetHeight : 0;
      if (appShell) appShell.style.paddingBottom = `${Math.max(dockHeight + 24, 160)}px`;
    }

    function updateViewModeButtons() {
      const activeClass = 'border-blue-700 bg-blue-950/50 text-blue-100';
      const inactiveClass = 'border-zinc-700 text-zinc-100';
      structuredViewBtn.className = `rounded-2xl border px-3 py-2 text-xs hover:bg-zinc-800 ${appState.view.mode === 'structured' ? activeClass : inactiveClass}`;
      rawTerminalViewBtn.className = `rounded-2xl border px-3 py-2 text-xs hover:bg-zinc-800 ${appState.view.mode === 'raw-terminal' ? activeClass : inactiveClass}`;
    }

    function setViewMode(mode) {
      if (mode !== 'structured' && mode !== 'raw-terminal') return;
      if (appState.view.mode === mode) return;
      appState.view.mode = mode;
      updateViewModeButtons();
      renderLogPane();
    }

    function updateRuntimeMeta(payload = {}) {
      runtimeState.meta = {
        source: payload.source || runtimeState.meta.source || '',
        skillName: payload.skillName || runtimeState.meta.skillName || '',
        target: payload.target || runtimeState.meta.target || '',
        targetType: payload.targetType || runtimeState.meta.targetType || '',
        targetPath: payload.targetPath || runtimeState.meta.targetPath || '',
        resultView: payload.resultView || runtimeState.meta.resultView || '',
        resumeSessionId: payload.resumeSessionId || runtimeState.meta.resumeSessionId || '',
        contextId: payload.contextId || runtimeState.meta.contextId || '',
        contextTitle: payload.contextTitle || runtimeState.meta.contextTitle || '',
        targetText: payload.targetText || runtimeState.meta.targetText || ''
      };
    }

    function setSidebarOpen(open) {
      appState.workspace.sidebarOpen = open;
      sidebar.classList.toggle('-translate-x-full', !open);
      sidebarOverlay.classList.toggle('opacity-0', !open);
      sidebarOverlay.classList.toggle('pointer-events-none', !open);
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function normalizeOption(option) {
      const lower = String(option).toLowerCase();
      if (lower === 'y') return 'yes';
      if (lower === 'n') return 'no';
      return String(option);
    }

    function shouldUseProceedCTA(message, options) {
      const text = String(message || '').toLowerCase();
      const hasProceed = text.includes('should i proceed') || /\bproceed\b/.test(text);
      if (!hasProceed) return false;
      return !Array.isArray(options) || !options.length;
    }

    function effectivePromptOptions(message, options) {
      if (shouldUseProceedCTA(message, options)) return ['yes', 'no'];
      return Array.isArray(options) ? options.map(normalizeOption) : [];
    }

    function highlightDiffLine(line) {
      const escaped = String(line || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (escaped.startsWith('+') && !escaped.startsWith('+++')) return `<div class="diff-added px-3">${escaped}</div>`;
      if (escaped.startsWith('-') && !escaped.startsWith('---')) return `<div class="diff-removed px-3">${escaped}</div>`;
      if (escaped.startsWith('@@') || escaped.startsWith('diff --git') || escaped.startsWith('*** ') || escaped.startsWith('---') || escaped.startsWith('+++')) {
        return `<div class="diff-meta px-3">${escaped}</div>`;
      }
      return `<div class="px-3 text-zinc-200">${escaped || '&nbsp;'}</div>`;
    }

    function basename(path) {
      return String(path || '').split(/[\\/]/).filter(Boolean).pop() || '';
    }

    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleTimeString();
    }

    function formatSize(size) {
      if (!size) return '';
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      if (size < 1024 * 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)} MB`;
      return `${(size / 1024 / 1024 / 1024).toFixed(1)} GB`;
    }

    function joinPath(base, name) {
      if (!base || base === '.' || base === '/') return `${base === '/' ? '/' : ''}${name}`;
      const normalized = base.replace(/[\\/]+$/, '');
      return `${normalized}/${name}`;
    }

    function parentPath(path) {
      if (!path || path === '.' || path === '/' || /^[A-Za-z]:[\\/]?$/.test(path)) return path;
      const normalized = path.replace(/[\\/]+$/, '');
      const index = Math.max(normalized.lastIndexOf('/'), normalized.lastIndexOf('\\'));
      if (index <= 0) {
        if (/^[A-Za-z]:/.test(normalized)) return normalized.slice(0, 2) + '\\';
        return '/';
      }
      return normalized.slice(0, index);
    }

    function buildDiffContextFromPayload(payload = {}) {
      const id = payload.contextId || `diff:${payload.path || payload.title || Date.now()}`;
      return {
        id,
        type: 'diff',
        title: payload.title || payload.contextTitle || 'Diff 预览',
        path: payload.path || payload.targetPath || runtimeState.meta.targetPath || '',
        diff: payload.diff || '',
        lang: payload.lang || '',
        source: payload.source || runtimeState.meta.source || '',
        skillName: payload.skillName || runtimeState.meta.skillName || '',
        resultView: payload.resultView || runtimeState.meta.resultView || 'review-card',
        summary: payload.summary || payload.title || payload.path || '当前 Diff'
      };
    }

    function buildStepContextFromPayload(payload = {}) {
      const message = payload.msg || payload.message || payload.step || '';
      const targetPath = payload.targetPath || payload.target || runtimeState.meta.targetPath || '';
      const target = payload.target || targetPath;
      const tool = payload.tool || '';
      const command = payload.command || '';
      return {
        id: payload.contextId || `step:${payload.timestamp || message || Date.now()}`,
        type: 'step',
        message,
        status: payload.status || 'running',
        target,
        targetPath,
        tool,
        command,
        source: payload.source || runtimeState.meta.source || '',
        skillName: payload.skillName || runtimeState.meta.skillName || '',
        resultView: payload.resultView || runtimeState.meta.resultView || 'review-card',
        timestamp: payload.timestamp || '',
        title: payload.contextTitle || message || '当前步骤'
      };
    }

    function buildErrorContextFromPayload(payload = {}) {
      return {
        id: payload.contextId || `error:${payload.timestamp || payload.msg || Date.now()}`,
        type: 'error',
        message: payload.msg || payload.message || 'unknown error',
        stack: payload.stack || '',
        code: payload.code || '',
        targetPath: payload.targetPath || runtimeState.meta.targetPath || '',
        relatedStep: payload.step || projectionState.currentStep?.message || '',
        command: payload.command || '',
        source: payload.source || runtimeState.meta.source || '',
        skillName: payload.skillName || runtimeState.meta.skillName || '',
        resultView: payload.resultView || runtimeState.meta.resultView || 'review-card',
        timestamp: payload.timestamp || '',
        title: payload.contextTitle || payload.msg || '最近错误'
      };
    }

    function setActiveContext(type) {
      runtimeState.activeContextType = type || '';
    }

    function getContextByType(type) {
      return projectionState.contexts[type] || null;
    }

    function renderRuntimeMetaBadge() {
      const parts = [];
      if (runtimeState.meta.source) parts.push(`来源 ${runtimeState.meta.source}`);
      if (runtimeState.meta.skillName) parts.push(`skill ${runtimeState.meta.skillName}`);
      if (runtimeState.meta.contextTitle) parts.push(runtimeState.meta.contextTitle);
      if (runtimeState.meta.resumeSessionId) parts.push(`resume ${runtimeState.meta.resumeSessionId}`);
      runtimeMetaBadge.textContent = parts.join(' · ');
      runtimeMetaBadge.classList.toggle('hidden', parts.length === 0);
    }

    function renderHeaderStatus() {
      const agentStatusMap = { IDLE: '已连接 / 空闲', THINKING: '思考中', WAIT_INPUT: '等待输入', RUNNING_TOOL: '执行工具中' };
      const effectiveStatus = appState.connection.connected
        ? (agentStatusMap[runtimeState.agentState] || (appState.connection.running ? '运行中' : '已连接'))

      statusText.textContent = runtimeState.agentStateMessage ? `${effectiveStatus} · ${runtimeState.agentStateMessage}` : effectiveStatus;

        ? 'bg-red-500'
        : runtimeState.agentState === 'WAIT_INPUT'
          ? 'bg-blue-400'
          : runtimeState.agentState === 'RUNNING_TOOL'
            ? 'bg-violet-400'
            : runtimeState.agentState === 'THINKING'

              : 'bg-emerald-500';
      statusDot.className = 'h-2.5 w-2.5 rounded-full ' + dotColor;

      workspacePath.textContent = `工作区：${appState.workspace.cwd || '.'}`;
      sidebarPath.textContent = appState.workspace.cwd || '.';
      runBtn.disabled = !appState.connection.connected || appState.connection.running;
      commandInput.disabled = !appState.connection.connected || appState.connection.running;
      sendInputBtn.disabled = !appState.connection.connected || !appState.prompt.awaitingInput;
      inputField.disabled = !appState.connection.connected || !appState.prompt.awaitingInput;

      const savedResumeId = runtimeState.meta.resumeSessionId || localStorage.getItem('vibe_resumeSessionId') || '';
      const showResume = savedResumeId && runtimeState.agentState === 'IDLE' && appState.connection.connected;
      resumeSessionBtn.classList.toggle('hidden', !showResume);

    function renderStepPanel() {
      const context = projectionState.contexts.step;
      const hasStep = Boolean(context && context.message);
      stepPanel.classList.toggle('hidden', !hasStep);
      if (!hasStep) {
        stepText.textContent = '';

        stepSkillBtn.classList.add('hidden');
        return;
      }
      stepText.textContent = context.message || '';
      stepStatusText.textContent = context.status || 'running';
      stepMetaText.textContent = [context.tool ? `tool ${context.tool}` : '', context.targetPath || context.target || '', context.command ? `cmd ${context.command}` : ''].filter(Boolean).join(' · ');

    function renderPromptOptions(options) {
      promptOptionButtons.innerHTML = '';
      if (!options || !options.length) return;
      const proceedCTA = shouldUseProceedCTA(appState.prompt.message, []);
      options.forEach((option) => {
        const lower = String(option).toLowerCase();
        let style = 'border-blue-800 bg-blue-950/40 text-blue-100 hover:bg-blue-900/60';
        let label = option;
        if (lower === 'y' || lower === 'yes') {

          label = proceedCTA ? '🚀 冲！' : option;

    function appendMessageRow(role, innerNode, options = {}) {
      const row = document.createElement('div');

    function addMeta(container, label, timestamp) {

    function renderStructuredEntry(entry) {
      if (!entry) return;
      if (entry.kind === 'user') {
        const wrapper = document.createElement('div');
        const meta = document.createElement('div');
        meta.className = 'mb-2 text-[11px] uppercase tracking-wide text-blue-100/80';
        meta.textContent = entry.label || '输入';
        const body = document.createElement('pre');
        body.className = 'whitespace-pre-wrap break-words text-sm';
        body.textContent = entry.message || '';
        wrapper.append(meta, body);
        appendMessageRow('user', wrapper);
        return;
      }
      if (entry.kind === 'markdown') {
        const wrapper = document.createElement('div');
        addMeta(wrapper, 'assistant', entry.timestamp);
        const content = document.createElement('div');
        content.className = 'markdown-body';
        content.innerHTML = marked.parse(entry.message || '');
        wrapper.appendChild(content);
        appendMessageRow('assistant', wrapper, { messageKind: 'markdown-log', stream: entry.stream || 'stdout' });
        enhanceCodeBlocks(wrapper);
        return;
      }
      if (entry.kind === 'terminal') {
        const wrapper = document.createElement('div');
        const body = document.createElement('pre');
        body.dataset.terminalBody = 'true';
        body.className = 'whitespace-pre-wrap break-words font-mono text-sm ' + ((entry.stream || 'stdout') === 'stderr' ? 'text-red-200' : 'text-zinc-100');
        body.textContent = entry.text || '';
        wrapper.appendChild(body);
        appendMessageRow('assistant', wrapper, { messageKind: 'terminal-log', stream: entry.stream || 'stdout', bodySelector: '[data-terminal-body="true"]' });
        return;
      }
      if (entry.kind === 'error') {
        addErrorCard(entry.context || buildErrorContextFromPayload(entry));
        return;
      }
      if (entry.kind === 'system') addSystemMessage(entry.message || '', entry.timestamp);
    }

    function addSystemMessage(message, timestamp) {

      row.textContent = `[系统] ${message}${timestamp ? ` · ${formatTime(timestamp)}` : ''}`;

    function addRuntimeLog(label, detail, timestamp) {
      const entry = { kind: 'system', message: `${label}${detail ? ': ' + detail : ''}`, timestamp };
      projectionState.logEntries.push(entry);
      if (appState.view.mode === 'structured') {
        addSystemMessage(entry.message, timestamp);
      }
    }

    function copyText(text, trigger) {
      if (!text) return;
      const done = () => {
        if (!trigger) return;
        const original = trigger.textContent;
        trigger.textContent = '已复制';
        setTimeout(() => { trigger.textContent = original; }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => {});
        return;
      }
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      done();
    }

    function enhanceCodeBlocks(root) {
      root.querySelectorAll('pre code').forEach((code) => {
        hljs.highlightElement(code);
        const pre = code.parentElement;
        if (!pre || pre.querySelector('.code-copy-btn')) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'code-copy-btn';
        btn.textContent = '复制';
        btn.addEventListener('click', () => copyText(code.textContent || '', btn));
        pre.appendChild(btn);
      });
    }

    function looksLikeMarkdown(message) {
      if (!message) return false;
      return /```|^#{1,6}\s|^>\s|^[-*+]\s|^\d+\.\s|\[[^\]]+\]\([^)]+\)|\|.+\|/.test(message) || message.includes('## ') || message.includes('### ');
    }

    function looksLikeAIReply(message) {
      if (!message) return false;
      return looksLikeMarkdown(message) || message.includes('```') || message.length > 180;
    }

    function addUserBubble(text, label) {
      projectionState.logEntries.push({ kind: 'user', message: text, label });
      if (appState.view.mode === 'structured') renderLogPane();
    }

    function isTransientTerminalLine(text) {
      const normalized = String(text || '').replace(/^\r+/, '').trim();
      if (!normalized) return false;
      // 仅过滤极简旋转图标，还原真实终端内容显示
      return /^[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏]/.test(normalized) && normalized.length === 1;
    }

    function trimTransientTerminalTail(text) {
      const lines = String(text || '').split('\n');
      while (lines.length) {
        const last = lines[lines.length - 1];
        if (String(last || '').trim() === '') { lines.pop(); continue; }
        if (isTransientTerminalLine(last)) { lines.pop(); continue; }
        break;
      }
      return lines.join('\n');
    }

    function applyTerminalDelta(existingText, incomingText) {
      const current = String(existingText || '');
      const incoming = String(incomingText || '');
      if (!incoming) return current;
      
      // 只要有 \r 开头，就代表终端在执行“回车重写”动作
      if (incoming.startsWith('\r')) {
        const replacement = incoming.replace(/^\r+/, '');
        const lines = current.split('\n');
        if (!lines.length) return replacement;
        
        // 彻底解决“刷屏”：直接覆盖最后一行，这是 PTY 的物理行为
        lines[lines.length - 1] = replacement;
        return lines.join('\n');
      }
      
      if (isTransientTerminalLine(incoming)) {
        const trimmedCurrent = trimTransientTerminalTail(current);
        return `${trimmedCurrent ? `${trimmedCurrent}\n` : ''}${incoming}`;
      }
      return `${current ? `${current}\n` : ''}${incoming}`;
    }

    function ingestLogMessage(message, stream, timestamp) {
      const effectiveStream = stream || 'stdout';
      const normalizedMessage = String(message || '');
      const isMarkdown = effectiveStream !== 'stderr' && looksLikeAIReply(normalizedMessage) && !normalizedMessage.startsWith('\r');
      if (isMarkdown) {
        projectionState.logEntries.push({ kind: 'markdown', message: normalizedMessage, stream: effectiveStream, timestamp });
      } else {
        const previousEntry = projectionState.logEntries[projectionState.logEntries.length - 1];
        const nextText = applyTerminalDelta(previousEntry && previousEntry.kind === 'terminal' && previousEntry.stream === effectiveStream ? previousEntry.text : '', normalizedMessage);
        if (previousEntry && previousEntry.kind === 'terminal' && previousEntry.stream === effectiveStream) {
          previousEntry.text = nextText;
          previousEntry.timestamp = timestamp || previousEntry.timestamp;
        } else {
          projectionState.logEntries.push({ kind: 'terminal', stream: effectiveStream, text: normalizedMessage.startsWith('\r') ? normalizedMessage.replace(/^\r+/, '') : normalizedMessage, timestamp });
        }
      }
      projectionState.rawTerminalByStream[effectiveStream] = applyTerminalDelta(projectionState.rawTerminalByStream[effectiveStream] || '', normalizedMessage);
    }

    function addErrorCard(errorContext) {
      const wrapper = document.createElement('div');
      addMeta(wrapper, 'error', errorContext.timestamp);
      const top = document.createElement('div');
      top.className = 'mb-2 flex items-center justify-between gap-3';
      const title = document.createElement('div');
      title.className = 'text-sm font-semibold text-red-300';
      title.textContent = 'Error';
      const right = document.createElement('div');
      right.className = 'flex items-center gap-2';
      const skillBtn = document.createElement('button');
      skillBtn.type = 'button';
      skillBtn.className = 'rounded-xl border border-zinc-800 px-2.5 py-1 text-xs text-zinc-100 hover:bg-zinc-800';
      skillBtn.textContent = 'Skill';
      skillBtn.classList.toggle('hidden', getSkillMenuItemsForContext('error', errorContext).length === 0);
      skillBtn.addEventListener('click', (event) => openContextSkillMenu('error', errorContext.id, event.currentTarget));
      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'rounded-xl border border-red-900 px-2.5 py-1 text-xs text-red-100 hover:bg-red-950/50';
      copyBtn.textContent = '复制';
      copyBtn.addEventListener('click', () => copyText(errorContext.stack ? `${errorContext.message}\n\n${errorContext.stack}` : errorContext.message, copyBtn));
      right.append(skillBtn, copyBtn);
      top.append(title, right);
      wrapper.append(top);
      const body = document.createElement('pre');
      body.className = 'whitespace-pre-wrap break-words rounded-2xl border border-red-900/60 bg-red-950/30 p-3 text-sm text-red-100';
      body.textContent = errorContext.message || 'unknown error';
      wrapper.appendChild(body);
      const meta = [errorContext.code, errorContext.targetPath, errorContext.relatedStep].filter(Boolean).join(' · ');
      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'mt-2 text-xs text-red-200';
        metaEl.textContent = meta;
        wrapper.appendChild(metaEl);
      }
      if (errorContext.stack) {
        const details = document.createElement('details');
        details.className = 'mt-3';
        const summary = document.createElement('summary');
        summary.className = 'cursor-pointer text-xs text-red-200';
        summary.textContent = '查看 stack';
        const stackBody = document.createElement('pre');
        stackBody.className = 'mt-2 whitespace-pre-wrap break-words rounded-2xl bg-black/20 p-3 text-xs text-red-100';
        stackBody.textContent = errorContext.stack;
        details.append(summary, stackBody);
        wrapper.appendChild(details);
      }
      appendMessageRow('assistant', wrapper);
    }

    function quickButton(label, onClick, className = '') {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'shrink-0 rounded-2xl border px-3 py-2 text-sm ' + className;
      btn.textContent = label;
      btn.addEventListener('click', onClick);
      return btn;
    }

    function getGlobalActions() {
      const actions = [
        quickButton('Ctrl+C 中断', () => sendInputRaw('\u0003', '快捷动作'), 'border-red-900 bg-red-950/40 text-red-100 hover:bg-red-900/50'),
        quickButton('清屏', () => {
          projectionState.logEntries = [];
          projectionState.rawTerminalByStream = { stdout: '', stderr: '' };
          projectionState.logEntries.push({ kind: 'system', message: '已清空对话' });
          renderLogPane();
        }, 'border-zinc-700 bg-zinc-950 text-zinc-100 hover:bg-zinc-800'),
        quickButton('文件树', () => setSidebarOpen(true), 'border-zinc-700 bg-zinc-950 text-zinc-100 hover:bg-zinc-800')
      ];
      // 会话恢复快捷按钮
      const resumeId = runtimeState.meta.resumeSessionId || localStorage.getItem('vibe_resumeSessionId') || '';
      if (resumeId && runtimeState.agentState === 'IDLE' && appState.connection.connected) {
        actions.push(quickButton('继续对话', () => resumeSession(resumeId), 'border-emerald-700 bg-emerald-950/40 text-emerald-100 hover:bg-emerald-900/60'));
      }
      return actions;
    }

    function getPromptReplyActions() {
      if (!appState.prompt.awaitingInput || !appState.prompt.options.length) return [];
      return appState.prompt.options.map((option) => {
        const lower = String(option).toLowerCase();
        const proceedCTA = shouldUseProceedCTA(appState.prompt.message, []);
        let style = 'border-blue-800 bg-blue-950/40 text-blue-100 hover:bg-blue-900/60';
        let label = option;
        if (lower === 'y' || lower === 'yes') {
          style = proceedCTA ? 'border-emerald-700 bg-emerald-600 text-white hover:bg-emerald-500 text-base font-semibold px-5 py-3' : 'border-emerald-800 bg-emerald-950/40 text-emerald-100 hover:bg-emerald-900/60';
          label = proceedCTA ? '🚀 冲！' : option;
        } else if (lower === 'n' || lower === 'no') {
          style = proceedCTA ? 'border-red-700 bg-red-600 text-white hover:bg-red-500 text-base font-semibold px-5 py-3' : 'border-red-800 bg-red-950/40 text-red-100 hover:bg-red-900/60';
          label = proceedCTA ? '🛑 停下' : option;
        }
        return quickButton(label, () => sendInput(option), style);
      });
    }

    function getRuntimeContextActions() {
      const actions = [];
      const diff = projectionState.contexts.diff;
      const step = projectionState.contexts.step;
      const error = projectionState.contexts.error;
      if (diff) {
        actions.push(quickButton('最近 Diff', () => openDiffModal(diff), 'border-violet-800 bg-violet-950/40 text-violet-100 hover:bg-violet-900/60'));
        if (getSkillMenuItemsForContext('diff', diff).length) {
          actions.push(quickButton('Diff Skills', (event) => openContextSkillMenu('diff', diff.id, event.currentTarget), 'border-emerald-800 bg-emerald-950/40 text-emerald-100 hover:bg-emerald-900/60'));
        }
      }
      if (step && getSkillMenuItemsForContext('step', step).length) {
        actions.push(quickButton('Step Skills', (event) => openContextSkillMenu('step', step.id, event.currentTarget), 'border-sky-800 bg-sky-950/40 text-sky-100 hover:bg-sky-900/60'));
      }
      if (error && getSkillMenuItemsForContext('error', error).length) {
        actions.push(quickButton('Error Skills', (event) => openContextSkillMenu('error', error.id, event.currentTarget), 'border-red-900 bg-red-950/40 text-red-100 hover:bg-red-900/60'));
      }
      return actions;
    }

    function renderActionPanel() {
      actionPanel.innerHTML = '';
      [...getGlobalActions(), ...getRuntimeContextActions(), ...getPromptReplyActions()].forEach((button) => actionPanel.appendChild(button));
    }

    function openInputCard(message, options) {
      appState.prompt.awaitingInput = true;
      appState.prompt.message = message || '等待输入';
      appState.prompt.options = Array.isArray(options) && options.length ? effectivePromptOptions(message, options) : appState.prompt.options;
      renderPromptCard();
      updateStatus();
      inputField.focus();
    }

    function closeInputCard() {
      appState.prompt.awaitingInput = false;
      appState.prompt.options = [];
      appState.prompt.message = '';
      renderPromptCard();
      updateStatus();
    }

    function applyAgentState(payload) {
      updateRuntimeMeta(payload);
      runtimeState.agentState = payload.state || 'IDLE';
      runtimeState.agentStateMessage = payload.msg || '';
      appState.connection.running = runtimeState.agentState !== 'IDLE';
      if (payload.step) {
        projectionState.currentStep = buildStepContextFromPayload({ ...payload, msg: payload.step, status: runtimeState.agentState === 'RUNNING_TOOL' ? 'running' : 'info' });
        projectionState.contexts.step = projectionState.currentStep;
        if (projectionState.currentStep.targetPath) appState.workspace.highlightedFilePath = projectionState.currentStep.targetPath;
      } else if (runtimeState.agentState === 'IDLE') {
        projectionState.currentStep = null;
        projectionState.contexts.step = null;
      }
      if (payload.awaitInput) {
        openInputCard(runtimeState.agentStateMessage || appState.prompt.message || '等待输入', appState.prompt.options);
      } else {
        closeInputCard();
      }
    }

    function getSkillMenuItemsForContext(type, context) {
      if (!context) return [];
      if (type === 'diff') {
        if (!context.diff) return [];
        return [
          { name: 'review', label: '代码审查' },
          { name: 'security-review', label: '安全审查' },
          { name: 'simplify', label: '简化方案' }
        ];
      }
      if (type === 'step') {
        const items = [
          { name: 'explain-step', label: '解释步骤' },
          { name: 'next-step', label: '推断下一步' }
        ];
        if (context.targetPath || projectionState.contexts.diff?.diff) items.push({ name: 'review', label: '关联审查' });
        return items;
      }
      if (type === 'error') {
        return [{ name: 'debug', label: '调试分析' }];
      }
      return [];
    }

    function openContextSkillMenu(contextType, contextId, anchorEl) {
      const context = getContextByType(contextType);
      if (!context || context.id !== contextId) return;
      runtimeState.skillMenu = {
        open: true,
        contextType,
        contextId,
        anchorRect: anchorEl?.getBoundingClientRect?.() || null,
        items: getSkillMenuItemsForContext(contextType, context)
      };
      setActiveContext(contextType);
      renderContextSkillMenu();
    }

    function closeContextSkillMenu() {
      runtimeState.skillMenu = { open: false, contextType: '', contextId: '', anchorRect: null, items: [] };
      renderContextSkillMenu();
    }

    function buildSkillRequest(name, contextType, context) {
      const base = {
        action: 'skill_exec',
        name,
        engine: appState.session.activeAI,
        cwd: appState.workspace.cwd,
        targetType: contextType,
        targetPath: context.targetPath || context.path || runtimeState.meta.targetPath || '',
        targetTitle: context.title || context.message || context.summary || '',
        resultView: context.resultView || 'review-card',
        contextId: context.id || '',
        contextTitle: context.title || context.message || context.summary || ''
      };
      if (contextType === 'diff') {
        return { ...base, targetDiff: context.diff || '' };
      }
      if (contextType === 'step') {
        const targetText = [context.message, context.target ? `target: ${context.target}` : '', context.targetPath ? `path: ${context.targetPath}` : '', context.tool ? `tool: ${context.tool}` : '', context.command ? `command: ${context.command}` : ''].filter(Boolean).join('\n');
        if (name === 'review' && projectionState.contexts.diff?.diff) {
          return {
            ...base,
            targetType: 'diff',
            targetPath: projectionState.contexts.diff.path || context.targetPath || '',
            targetTitle: projectionState.contexts.diff.title || context.title || '关联 Diff',
            contextTitle: context.title || context.message || '当前步骤',
            targetDiff: projectionState.contexts.diff.diff || ''
          };
        }
        return { ...base, targetText };
      }
      if (contextType === 'error') {
        const targetText = [context.message, context.code ? `code: ${context.code}` : '', context.relatedStep ? `step: ${context.relatedStep}` : '', context.command ? `command: ${context.command}` : ''].filter(Boolean).join('\n');
        return { ...base, targetText, targetStack: context.stack || '' };
      }
      return base;
    }

    function triggerContextSkill(name, contextType, context) {
      if (!context) return;
      const request = buildSkillRequest(name, contextType, context);
      addRuntimeLog('触发 Skill', name);
      updateRuntimeMeta({
        source: 'skill-center',
        skillName: name,
        targetType: request.targetType || contextType,
        targetPath: request.targetPath || '',
        resultView: request.resultView || 'review-card',
        contextId: request.contextId || '',
        contextTitle: request.contextTitle || request.targetTitle || '',
        targetText: request.targetText || ''
      });
      closeContextSkillMenu();
      sendJson(request);
      updateStatus();
    }

    function triggerSkill(name) {
      const diff = projectionState.contexts.diff;
      if (!diff) return;
      triggerContextSkill(name, 'diff', diff);
    }

    function openDiffModal(diffPayload) {
      projectionState.currentDiff = diffPayload;
      renderDiffModal();
      diffModal.classList.remove('pointer-events-none', 'opacity-0');
      if (diffPayload?.path) {
        appState.workspace.highlightedFilePath = diffPayload.path;
        renderFileList();
      }
      setActiveContext('diff');
    }

    function closeDiffModal() {
      diffModal.classList.add('pointer-events-none', 'opacity-0');
    }

    function handleIncomingEvent(payload) {
      if (payload.sessionId) appState.session.id = payload.sessionId;
      updateRuntimeMeta(payload);
      switch (payload.type) {
        case 'session_state':
          if (payload.state === 'closed') {
            appState.connection.running = false;
            if (appState.session.claudeInteractiveActive) break;
          }
          projectionState.logEntries.push({ kind: 'system', message: payload.msg || payload.state || 'session update', timestamp: payload.timestamp });
          renderLogPane();
          break;
        case 'agent_state': {
          const cmd = payload.command || '';
          const isAI = cmd === 'claude' || cmd === 'gemini';
          appState.session.claudeInteractiveActive = isAI && payload.state !== 'IDLE';
          if (isAI) {
            appState.session.activeAI = cmd;
          }
          // activity tracking
          if (payload.state === 'IDLE' && runtimeState.agentState !== 'IDLE') {
            const resumeId = payload.resumeSessionId || runtimeState.meta.resumeSessionId;
            if (resumeId) {
              localStorage.setItem('vibe_resumeSessionId', resumeId);
            }
            addRuntimeLog('命令完成', payload.msg || '', payload.timestamp);
            onClaudeFinish(payload.msg || '');
          } else if (payload.state === 'THINKING' && runtimeState.agentState === 'IDLE') {
            addRuntimeLog('执行命令', cmd || '', payload.timestamp);
          }
          if (payload.resumeSessionId) {
            localStorage.setItem('vibe_resumeSessionId', payload.resumeSessionId);
          }
          applyAgentState(payload);
          break;
        }
        case 'log': {
          const now = Date.now();
          const msg = payload.msg || '';
          const stream = payload.stream || 'stdout';
          if (msg === dedupState.lastLogMsg && stream === dedupState.lastLogStream && (now - dedupState.lastLogTime) < 200) break;
          dedupState.lastLogMsg = msg;
          dedupState.lastLogStream = stream;
          dedupState.lastLogTime = now;
          ingestLogMessage(msg, stream, payload.timestamp);
          renderLogPane();
          break;
        }
        case 'error': {
          const errorContext = buildErrorContextFromPayload(payload);
          projectionState.latestError = errorContext;
          projectionState.contexts.error = errorContext;
          projectionState.logEntries.push({ kind: 'error', context: errorContext, timestamp: payload.timestamp });
          setActiveContext('error');
          renderLogPane();
          break;
        }
        case 'prompt_request':
          if ((payload.msg || '等待输入') === appState.session.lastPromptMessage && runtimeState.agentState === 'WAIT_INPUT') break;
          appState.session.lastPromptMessage = payload.msg || '等待输入';
          appState.prompt.options = effectivePromptOptions(payload.msg || '等待输入', payload.options || []);
          appState.prompt.message = payload.msg || '等待输入';
          // Stop activity timer when Claude is ready for next input
          if (claudeActivity.active) {
            const elapsed = claudeActivity.startTime ? Date.now() - claudeActivity.startTime : 0;
            onClaudeFinish(elapsed ? formatDuration(elapsed) : '');
          }
          renderPromptCard();
          if (runtimeState.agentState === 'WAIT_INPUT') inputCard.classList.remove('hidden');
          break;
        case 'step_update': {
          const stepMsg = payload.msg || payload.message || '';
          const stepStatus = payload.status || '';
          if (stepMsg === dedupState.lastStepMsg && stepStatus === dedupState.lastStepStatus) break;
          dedupState.lastStepMsg = stepMsg;
          dedupState.lastStepStatus = stepStatus;
          const stepContext = buildStepContextFromPayload(payload);
          projectionState.currentStep = stepContext;
          projectionState.contexts.step = stepContext;
          if (stepContext.targetPath) {
            appState.workspace.highlightedFilePath = stepContext.targetPath;
            if (!runtimeState.meta.targetPath) runtimeState.meta.targetPath = stepContext.targetPath;
            renderFileList();
          }
          setActiveContext('step');
          // Claude activity tracking
          if (stepStatus === 'done') {
            onToolDone(stepContext.target || stepContext.targetPath);
          } else {
            onToolStart(stepMsg, stepContext.target || stepContext.targetPath);
          }
          break;
        }
        case 'file_diff': {
          const diffContext = buildDiffContextFromPayload(payload);
          projectionState.currentDiff = diffContext;
          projectionState.contexts.diff = diffContext;
          setActiveContext('diff');
          openDiffModal(diffContext);
          break;
        }
        case 'progress': {
          const msg = payload.msg || '';
          if (msg) addRuntimeLog('统计', msg, payload.timestamp);
          if (payload.percent === 100) {
            onClaudeFinish(msg);
          }
          break;
        }
        case 'fs_list_result':
          appState.workspace.cwd = payload.current_path || appState.workspace.cwd;
          appState.workspace.items = Array.isArray(payload.items) ? payload.items : [];
          renderFileList();
          break;
        default:
          projectionState.logEntries.push({ kind: 'system', message: `收到未处理事件 ${payload.type || 'unknown'}`, timestamp: payload.timestamp });
          renderLogPane();
          break;
      }
      updateStatus();
    }

    function getWsUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${location.host}/ws?token=${encodeURIComponent(appState.token)}`;
    }

    function ensureToken(forcePrompt = false) {
      if (!forcePrompt && appState.token) return true;
      const next = window.prompt('Enter token', appState.token || '');
      if (!next) return false;
      appState.token = next.trim();
      localStorage.setItem('vibe_token', appState.token);
      return true;
    }

    function sendJson(data) {
      if (!appState.ws || appState.ws.readyState !== WebSocket.OPEN) {
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: 'WebSocket 未连接。' }) });
        renderLogPane();
        return false;
      }
      appState.ws.send(JSON.stringify(data));
      return true;
    }

    function requestFSList(path) {
      if (!sendJson({ action: 'fs_list', path })) return;
    }

    function connect(forcePrompt = false) {
      if (!ensureToken(forcePrompt)) {
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: '缺少 token，无法连接服务。' }) });
        renderLogPane();
        return;
      }
      if (appState.ws) {
        appState.ws.onopen = null;
        appState.ws.onclose = null;
        appState.ws.onerror = null;
        appState.ws.onmessage = null;
        appState.ws.close();
      }
      appState.connection.connected = false;
      appState.connection.running = false;
      runtimeState.agentState = 'IDLE';
      runtimeState.agentStateMessage = '';
      runtimeState.meta = { source: '', skillName: '', target: '', targetType: '', targetPath: '', resultView: '', resumeSessionId: localStorage.getItem('vibe_resumeSessionId') || '', contextId: '', contextTitle: '', targetText: '' };
      projectionState.logEntries = [];
      projectionState.rawTerminalByStream = { stdout: '', stderr: '' };
      projectionState.currentDiff = null;
      projectionState.currentStep = null;
      projectionState.latestError = null;
      projectionState.contexts = { diff: null, step: null, error: null };
      appState.session.lastPromptMessage = '';
      appState.session.claudeInteractiveActive = false;
      closeInputCard();
      closeContextSkillMenu();
      updateStatus();
      projectionState.logEntries.push({ kind: 'system', message: '正在连接 WebSocket' });
      renderLogPane();
      try {
        appState.ws = new WebSocket(getWsUrl());
      } catch (err) {
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: `创建 WebSocket 失败：${err.message || err}` }) });
        renderLogPane();
        return;
      }
      appState.ws.onopen = () => {
        appState.connection.connected = true;
        updateStatus();
        projectionState.logEntries.push({ kind: 'system', message: 'WebSocket 已连接' });
        renderLogPane();
        requestFSList('.');
      };
      appState.ws.onclose = () => {
        appState.connection.connected = false;
        appState.connection.running = false;
        runtimeState.agentState = 'IDLE';
        runtimeState.agentStateMessage = '';
        runtimeState.meta = { source: '', skillName: '', target: '', targetType: '', targetPath: '', resultView: '', resumeSessionId: '', contextId: '', contextTitle: '', targetText: '' };
        projectionState.currentStep = null;
        projectionState.contexts.step = null;
        closeInputCard();
        closeContextSkillMenu();
        updateStatus();
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: '连接已关闭，请检查 token 或服务状态。' }) });
        renderLogPane();
      };
      appState.ws.onerror = () => {
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: 'WebSocket 连接错误，请检查 token 或服务状态。' }) });
        renderLogPane();
      };
      appState.ws.onmessage = (event) => {
        let payload;
        try {
          payload = JSON.parse(event.data);
        } catch (err) {
          projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: `收到无法解析的消息：${err.message || err}` }) });
          renderLogPane();
          return;
        }
        handleIncomingEvent(payload);
      };
    }

    function sendInputRaw(raw, label = '输入') {
      if (!raw) return;
      if (!sendJson({ action: 'input', data: raw.endsWith('\n') ? raw : `${raw}\n`, permissionMode: permissionModeSelect.value || undefined })) return;
      addUserBubble(raw === '\u0003' ? 'Ctrl+C' : raw.replace(/\n$/, ''), label);
      if (appState.session.claudeInteractiveActive) {
        runtimeState.agentState = 'THINKING';
        runtimeState.agentStateMessage = '思考中';
        resetTaskTimer();
        updateStatus();
      }
      inputField.value = '';
      inputField.focus();
    }

    function resumeSession(sessionId) {
      if (!sessionId || !appState.connection.connected) return;
      addRuntimeLog('恢复会话', sessionId);
      updateRuntimeMeta({ source: 'command', resumeSessionId: sessionId });
      sendJson({ action: 'exec', mode: 'pty', cmd: `claude --resume ${sessionId}`, cwd: appState.workspace.cwd, source: 'command', permissionMode: permissionModeSelect.value || undefined });
      addUserBubble(`恢复会话 ${sessionId}`, '恢复');
      updateStatus();
    }

    function runCommand(command) {
      const cmd = (command || '').trim();
      if (!cmd) return;
      if (!appState.connection.connected) {
        projectionState.logEntries.push({ kind: 'error', context: buildErrorContextFromPayload({ msg: '当前未连接，无法运行命令。' }) });
        renderLogPane();
        return;
      }
      updateRuntimeMeta({ source: 'command', skillName: '', resultView: '', targetType: '', targetPath: '', resumeSessionId: '', contextId: '', contextTitle: '', targetText: '' });
      if (!sendJson({ action: 'exec', mode: 'pty', cmd, cwd: appState.workspace.cwd, source: 'command', permissionMode: permissionModeSelect.value || undefined })) return;
      addUserBubble(`${cmd}\n@ ${appState.workspace.cwd || '.'}`, '命令');
      updateStatus();
      commandInput.value = '';
      setSidebarOpen(false);
    }

    function sendInput(value) {
      const raw = value != null ? String(value).trim() : inputField.value.trim();
      if (!raw) return;
      sendInputRaw(raw, '回复');
    }

    commandForm.addEventListener('submit', (event) => {
      event.preventDefault();
      runCommand(commandInput.value);
    });
    inputForm.addEventListener('submit', (event) => {
      event.preventDefault();
      sendInput();
    });
    structuredViewBtn.addEventListener('click', () => setViewMode('structured'));
    rawTerminalViewBtn.addEventListener('click', () => setViewMode('raw-terminal'));
    reconnectBtn.addEventListener('click', () => connect(false));
    retokenBtn.addEventListener('click', () => connect(true));
    resumeSessionBtn.addEventListener('click', () => {
      const resumeId = runtimeState.meta.resumeSessionId || localStorage.getItem('vibe_resumeSessionId') || '';
      if (resumeId) resumeSession(resumeId);
    });
    openSidebarBtn.addEventListener('click', () => setSidebarOpen(true));
    closeSidebarBtn.addEventListener('click', () => setSidebarOpen(false));
    copyDiffBtn.addEventListener('click', () => copyText(projectionState.currentDiff?.diff || '', copyDiffBtn));
    closeDiffBtn.addEventListener('click', () => closeDiffModal());
    diffSkillBtn.addEventListener('click', (event) => {
      const diff = projectionState.contexts.diff;
      if (diff) openContextSkillMenu('diff', diff.id, event.currentTarget);
    });
    stepSkillBtn.addEventListener('click', (event) => {
      const step = projectionState.contexts.step;
      if (step) openContextSkillMenu('step', step.id, event.currentTarget);
    });
    diffModal.addEventListener('click', (event) => {
      if (event.target === diffModal) closeDiffModal();
    });
    window.addEventListener('resize', () => {
      syncBottomSpacing();
      renderContextSkillMenu();
    });
    window.addEventListener('click', (event) => {
      if (!runtimeState.skillMenu.open) return;
      if (contextSkillMenu.contains(event.target)) return;
      if (event.target === diffSkillBtn || event.target === stepSkillBtn) return;
      closeContextSkillMenu();
    });
    sidebarOverlay.addEventListener('click', () => setSidebarOpen(false));
    sidebarRefreshBtn.addEventListener('click', () => requestFSList(appState.workspace.cwd || '.'));
    sidebarUpBtn.addEventListener('click', () => requestFSList(parentPath(appState.workspace.cwd || '.')));

    updateStatus();
    updateViewModeButtons();
    renderFileList();
    renderLogPane();
    connect(false);
  </script>
</body>
</html>
